<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventHub - Login</title>
<meta name="description" content="Masuk ke dashboard EventHub Organizer Anda.">
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style type="text/tailwindcss">
  :root {
    --primary: #165DFF;
    --primary-hover: #0E4BD9;
    --foreground: #080C1A;
    --secondary: #6A7686;
    --muted: #EFF2F7;
    --border: #F3F4F3;
    --card-grey: #F1F3F6;
    --success: #30B22D;
    --error: #ED6B60;
    --font-sans: 'Lexend Deca', sans-serif;
  }
  @theme inline {
    --color-primary: var(--primary);
    --color-primary-hover: var(--primary-hover);
    --color-foreground: var(--foreground);
    --color-secondary: var(--secondary);
    --color-muted: var(--muted);
    --color-border: var(--border);
    --color-card-grey: var(--card-grey);
    --color-success: var(--success);
    --color-error: var(--error);
    --font-sans: var(--font-sans);
    --radius-3xl: 24px;
  }
  body {
    background-image: radial-gradient(#C9E6FC 1px, transparent 1px);
    background-size: 32px 32px;
  }
</style>
</head>
<body class="font-sans bg-muted text-foreground min-h-screen flex items-center justify-center p-4">

<!-- Login Card -->
<div class="bg-white w-full max-w-[480px] rounded-[32px] p-8 md:p-10 shadow-xl shadow-primary/5 ring-1 ring-white">
  
  <!-- Header -->
  <div class="text-center mb-10">
    <div class="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-primary/30">
      <i data-lucide="layers" class="size-8 text-white"></i>
    </div>
    <h1 class="text-2xl font-bold text-foreground mb-2">Selamat Datang Kembali!</h1>
    <p class="text-secondary font-medium">Masuk untuk mengelola event Anda</p>
  </div>

  <!-- Form -->
  <form onsubmit="handleLogin(event)" class="flex flex-col gap-5">
    
    <!-- Email Input -->
    <div class="group relative">
      <div class="absolute left-5 top-1/2 -translate-y-1/2 text-secondary group-focus-within:text-primary transition-colors duration-300">
        <i data-lucide="mail" class="size-5"></i>
      </div>
      <input type="email" id="email" required 
        class="w-full h-14 pl-14 pr-5 rounded-2xl bg-gray-50 ring-1 ring-border focus:ring-2 focus:ring-primary focus:bg-white outline-none font-medium transition-all duration-300 placeholder:text-gray-400"
        placeholder="nama@email.com">
    </div>

    <!-- Password Input -->
    <div class="group relative">
      <div class="absolute left-5 top-1/2 -translate-y-1/2 text-secondary group-focus-within:text-primary transition-colors duration-300">
        <i data-lucide="lock" class="size-5"></i>
      </div>
      <input type="password" id="password" required 
        class="w-full h-14 pl-14 pr-12 rounded-2xl bg-gray-50 ring-1 ring-border focus:ring-2 focus:ring-primary focus:bg-white outline-none font-medium transition-all duration-300 placeholder:text-gray-400"
        placeholder="••••••••">
      <button type="button" onclick="togglePassword()" class="absolute right-5 top-1/2 -translate-y-1/2 text-secondary hover:text-foreground cursor-pointer p-1">
        <i id="eye-icon" data-lucide="eye" class="size-5"></i>
      </button>
    </div>

    <!-- Options -->
    <div class="flex items-center justify-between mt-1">
      <label class="flex items-center gap-2 cursor-pointer group">
        <div class="relative flex items-center">
          <input type="checkbox" class="peer h-5 w-5 rounded-md border border-gray-300 text-primary focus:ring-primary cursor-pointer appearance-none checked:bg-primary checked:border-primary transition-all duration-200">
          <i data-lucide="check" class="absolute inset-0 m-auto size-3 text-white opacity-0 peer-checked:opacity-100 transition-opacity duration-200 pointer-events-none"></i>
        </div>
        <span class="text-sm font-medium text-secondary group-hover:text-foreground transition-colors">Ingat saya</span>
      </label>
      <a href="#" class="text-sm font-bold text-primary hover:underline">Lupa Password?</a>
    </div>

    <!-- Submit Button -->
    <button type="submit" id="loginBtn" class="w-full h-14 bg-primary hover:bg-primary-hover text-white rounded-full font-bold text-lg shadow-lg shadow-primary/25 transition-all duration-300 transform active:scale-[0.98] cursor-pointer flex items-center justify-center gap-2 mt-2">
      <span>Masuk ke EventHub</span>
      <i data-lucide="arrow-right" class="size-5"></i>
    </button>
  </form>

  <!-- Divider -->
  <div class="relative my-8">
    <div class="absolute inset-0 flex items-center">
      <div class="w-full border-t border-border"></div>
    </div>
    <div class="relative flex justify-center text-sm">
      <span class="px-4 bg-white text-secondary font-medium">Atau masuk dengan</span>
    </div>
  </div>

  <!-- Social Login -->
  <div class="grid grid-cols-2 gap-4">
    <button type="button" class="flex items-center justify-center gap-2 h-12 rounded-xl ring-1 ring-border hover:ring-primary hover:bg-gray-50 transition-all duration-300 cursor-pointer">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="size-5" alt="Google">
      <span class="font-semibold text-foreground">Google</span>
    </button>
    <button type="button" class="flex items-center justify-center gap-2 h-12 rounded-xl ring-1 ring-border hover:ring-primary hover:bg-gray-50 transition-all duration-300 cursor-pointer">
      <img src="https://www.svgrepo.com/show/475647/apple-color.svg" class="size-5" alt="Apple">
      <span class="font-semibold text-foreground">Apple</span>
    </button>
  </div>

  <!-- Register Link -->
  <div class="text-center mt-10">
    <p class="text-secondary font-medium">
      Belum punya akun? 
      <a href="#" class="text-primary font-bold hover:underline">Daftar sekarang</a>
    </p>
  </div>

</div>

<!-- Loading/Success Overlay -->
<div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 hidden items-center justify-center flex-col gap-4">
  <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
  <p class="text-primary font-bold text-lg animate-pulse">Memverifikasi...</p>
</div>

<script>
  // Initialize Lucide icons
  lucide.createIcons();

  function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    
    if (input.type === 'password') {
      input.type = 'text';
      icon.setAttribute('data-lucide', 'eye-off');
    } else {
      input.type = 'password';
      icon.setAttribute('data-lucide', 'eye');
    }
    lucide.createIcons();
  }

  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const overlay = document.getElementById('loadingOverlay');
    const email = document.getElementById('email').value;

    if(!email) return;

    // Show loading state
    overlay.classList.remove('hidden');
    overlay.classList.add('flex');

    // Simulate API call
    setTimeout(() => {
      overlay.innerHTML = `
        <div class="w-16 h-16 bg-success rounded-full flex items-center justify-center mb-4 animate-[bounce_0.5s_ease-out]">
          <i data-lucide="check" class="text-white size-8"></i>
        </div>
        <h3 class="text-2xl font-bold text-foreground">Login Berhasil!</h3>
        <p class="text-secondary">Mengalihkan ke dashboard...</p>
      `;
      lucide.createIcons();
      
      setTimeout(() => {
        // In a real app, window.location.href = '/dashboard';
        overlay.classList.add('hidden');
        overlay.classList.remove('flex');
        alert("Demo: Redirecting to Dashboard...");
      }, 1500);
    }, 1500);
  }
  
  // Prevent actual link navigation for demo
  document.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', (e) => e.preventDefault());
  });
</script>

</body>
</html>
